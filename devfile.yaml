schemaVersion: 2.2.2
metadata:
  name: opencode-private-ai
  displayName: "OpenCode - Private AI Code Assistant"
  description: "AI-powered coding workspace with OpenCode pre-configured to use the private Qwen3-Coder-30B model via the llm-d AI Gateway. Includes VS Code extension and browser-based Web UI (port 4096). No external API keys required. Zero data egress."
  icon: https://opencode.ai/favicon.ico
  tags:
    - AI
    - OpenCode
    - Private
    - Qwen3-Coder
  version: 1.0.0
projects:
  - name: synapxe-opencode-demo
    git:
      remotes:
        origin: https://github.com/nirjhar17/synapxe-opencode-demo.git
components:
  - name: dev-tools
    container:
      image: quay.io/njajodia/devspaces-opencode:latest
      memoryRequest: 1Gi
      memoryLimit: 8Gi
      cpuRequest: 500m
      cpuLimit: 4000m
      mountSources: true
      sourceMapping: /projects
      env:
        - name: VLLM_ENDPOINT
          value: "https://maas-default-gateway-data-science-gateway-class.openshift-ingress.svc.cluster.local/ai-serving/qwen3-coder/v1"
        - name: VLLM_MODEL_ID
          value: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
        - name: OPENAI_API_KEY
          value: "EMPTY"
        - name: OPENAI_BASE_URL
          value: "https://maas-default-gateway-data-science-gateway-class.openshift-ingress.svc.cluster.local/ai-serving/qwen3-coder/v1"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - name: OPENCODE_SERVER_PASSWORD
          value: "changeme"
        - name: DEFAULT_EXTENSIONS
          value: "/tmp/opencode-ext/sst-dev.opencode.vsix"
      endpoints:
        - name: opencode-web
          targetPort: 4096
          exposure: public
          protocol: https
          attributes:
            cookiesAuthEnabled: true
commands:
  - id: opencode
    exec:
      label: "Start OpenCode (TUI)"
      component: dev-tools
      workingDir: /projects
      commandLine: opencode
      group:
        kind: run
        isDefault: true
  - id: setup-opencode-config
    exec:
      label: "Setup OpenCode Config"
      component: dev-tools
      commandLine: |
        mkdir -p /home/user/.config/opencode /home/user/.local/share/opencode
        cat > /home/user/.config/opencode/opencode.json << 'EOCFG'
        {
          "$schema": "https://opencode.ai/config.json",
          "provider": {
            "vllm": {
              "npm": "@ai-sdk/openai-compatible",
              "name": "Private AI Gateway (maas)",
              "options": {
                "baseURL": "https://maas-default-gateway-data-science-gateway-class.openshift-ingress.svc.cluster.local/ai-serving/qwen3-coder/v1"
              },
              "models": {
                "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8": {
                  "name": "Qwen3 Coder 30B (Private AI)",
                  "limit": {
                    "context": 32768,
                    "output": 8192
                  }
                }
              }
            }
          },
          "model": "vllm/Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
        }
        EOCFG
        cat > /home/user/.local/share/opencode/auth.json << 'EOAUTH'
        {
          "vllm": {
            "type": "api",
            "key": "EMPTY"
          }
        }
        EOAUTH
        echo "OpenCode config written"
  - id: download-opencode-extension
    exec:
      label: "Download OpenCode Extension"
      component: dev-tools
      commandLine: |
        mkdir -p /tmp/opencode-ext
        curl -fsSL "https://open-vsx.org/api/sst-dev/opencode/latest/file/sst-dev.opencode-0.0.13.vsix" \
          --location -o /tmp/opencode-ext/sst-dev.opencode.vsix
        echo "OpenCode extension downloaded"
  - id: start-opencode-web
    exec:
      label: "Start OpenCode Web UI"
      component: dev-tools
      commandLine: |
        nohup opencode web --port 4096 --hostname 0.0.0.0 > /tmp/opencode-web.log 2>&1 &
        echo "OpenCode Web UI started on port 4096"
events:
  postStart:
    - setup-opencode-config
    - download-opencode-extension
    - start-opencode-web
